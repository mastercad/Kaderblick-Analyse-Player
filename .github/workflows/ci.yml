name: Pull Request Checks

on:
  pull_request:
    branches:
      - main
  workflow_call:

jobs:
  commit_messages:
    name: Commit-Messages pruefen
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Abhaengigkeiten installieren
        run: npm ci

      - name: Commitlint ausfuehren
        shell: bash
        run: |
          npx commitlint --from "origin/${{ github.base_ref }}" --to "${{ github.sha }}" --verbose

  validate:
    name: Lint und Tests
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Abhaengigkeiten installieren
        run: npm ci

      - name: Linter ausfuehren
        run: npm run lint

      - name: Tests ausfuehren
        run: npm test