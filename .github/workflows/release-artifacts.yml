name: Release Artefacts

on:
  workflow_call:
    inputs:
      tag:
        description: Git tag to build and publish assets from
        required: true
        type: string

permissions:
  contents: write

jobs:
  build_linux:
    name: Linux Pakete bauen
    runs-on: ubuntu-latest

    steps:
      - name: Repository am Release-Tag auschecken
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Abhaengigkeiten installieren
        run: npm ci

      - name: Linux Release bauen
        run: npm run build

      - name: Linux Artefakte hochladen
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: |
            release/*.AppImage
            release/*.deb
          if-no-files-found: error

  build_windows:
    name: Windows Pakete bauen
    runs-on: windows-latest

    steps:
      - name: Repository am Release-Tag auschecken
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Abhaengigkeiten installieren
        run: npm ci

      - name: Windows Release bauen
        run: npm run build
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Windows Artefakte hochladen
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: |
            release/*-setup-*.exe
            release/*-portable-*.exe
          if-no-files-found: error

  build_macos:
    name: macOS Pakete bauen
    runs-on: macos-latest

    steps:
      - name: Repository am Release-Tag auschecken
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Abhaengigkeiten installieren
        run: npm ci

      - name: macOS Release bauen
        run: npm run build
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: macOS Artefakte hochladen
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: |
            release/*.dmg
            release/*.zip
          if-no-files-found: error

  attach_assets:
    name: Artefakte ans Release haengen
    runs-on: ubuntu-latest
    needs:
      - build_linux
      - build_windows
      - build_macos

    steps:
      - name: Linux Artefakte herunterladen
        uses: actions/download-artifact@v4
        with:
          name: linux-release
          path: dist-artifacts/linux

      - name: Windows Artefakte herunterladen
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: dist-artifacts/windows

      - name: macOS Artefakte herunterladen
        uses: actions/download-artifact@v4
        with:
          name: macos-release
          path: dist-artifacts/macos

      - name: Release-Dateien hochladen
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: |
            dist-artifacts/**/*.AppImage
            dist-artifacts/**/*.deb
            dist-artifacts/**/*.exe
            dist-artifacts/**/*.dmg
            dist-artifacts/**/*.zip