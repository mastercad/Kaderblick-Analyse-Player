name: Semantic Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  ci:
    name: CI absichern
    uses: ./.github/workflows/ci.yml

  release:
    name: Version und GitHub Release erzeugen
    runs-on: ubuntu-latest
    needs: ci
    outputs:
      published: ${{ steps.semantic_release.outputs.new_release_published }}
      version: ${{ steps.semantic_release.outputs.new_release_version }}
      tag: ${{ steps.semantic_release.outputs.new_release_git_tag }}

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Abhaengigkeiten installieren
        run: npm ci

      - name: Semantic Release ausfuehren
        id: semantic_release
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          semantic_version: 24

  artifacts:
    name: Release-Artefakte bauen
    needs: release
    if: needs.release.outputs.published == 'true'
    uses: ./.github/workflows/release-artifacts.yml
    with:
      tag: ${{ needs.release.outputs.tag }}
    secrets: inherit
